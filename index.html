<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas PrintShop - Rush ID Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style id="printPageStyle">
        @page { size: A4; margin: 5mm; }
    </style>

    <style>
        :root {
            --border-color: #000000;
            --border-thickness: 1px;
            --img-brightness: 100%;
            --img-contrast: 100%;
        }

        /* Canvas Setup */
        .print-area { 
            width: 210mm; 
            min-height: 297mm; 
            padding: 10mm; 
            box-sizing: border-box; 
            background: white;
            display: flex;
            flex-direction: column;
            align-items: start;
            transition: width 0.3s ease, min-height 0.3s ease;
            transform-origin: top center;
            flex-shrink: 0; 
        }
        
        .id-grid {
            display: grid;
            gap: 0;
            border-top: var(--border-thickness) solid var(--border-color);
            border-left: var(--border-thickness) solid var(--border-color);
            width: max-content; 
            margin-top: calc(var(--border-thickness) * -1); 
            justify-content: start;
        }

        .id-grid:empty {
            display: none;
        }

        .border-overlap {
            border-right: var(--border-thickness) solid var(--border-color);
            border-bottom: var(--border-thickness) solid var(--border-color);
            box-sizing: border-box; 
            display: block;
            filter: brightness(var(--img-brightness)) contrast(var(--img-contrast));
            -webkit-user-drag: none;
            user-select: none;
        }

        .cropper-container img {
            filter: brightness(var(--img-brightness)) contrast(var(--img-contrast));
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 5px; border: 2px solid #e2e8f0; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .cursor-grab { cursor: grab; }
        .cursor-grabbing { cursor: grabbing !important; }

        /* --- PRINT SPECIFIC RULES --- */
        @media print {
            body, html { 
                background: white !important; 
                padding: 0 !important; 
                margin: 0 !important; 
                height: auto !important; 
                overflow: visible !important;
                display: block !important;
            }
            .no-print { display: none !important; }
            .print-workspace, .print-padding-wrapper {
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
                background: transparent !important;
                min-width: 0 !important;
                min-height: 0 !important;
            }
            .print-area { 
                margin: 0 !important; 
                /* FIXED: We keep a 10mm padding during print to ensure the border is never cut off */
                padding: 10mm !important; 
                border: none !important; 
                box-shadow: none !important; 
                width: auto !important; 
                min-height: auto !important; 
            }
        }
    </style>
</head>

<body class="bg-gray-200 h-screen flex flex-col md:flex-row font-sans overflow-hidden">

    <div class="w-full md:w-[420px] flex-shrink-0 bg-white h-full shadow-2xl overflow-y-auto no-print z-10 flex flex-col">
        <div class="p-6 space-y-8">
            
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 rounded-xl flex items-center justify-center flex-shrink-0 overflow-hidden bg-gray-50">
                    <img 
                        src="lucas_printshop_logo.jpg" 
                        alt="Printshop Logo" 
                        class="max-w-full max-h-full"
                        onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
                    >
                    <div class="text-xs text-gray-300 font-mono hidden">Logo</div>
                </div>
                
                <div>
                    <h1 class="text-2xl font-black text-blue-700 tracking-tight">Rush ID Pro</h1>
                    <p class="text-sm text-gray-500">Printshop Workspace</p>
                </div>
            </div>
            
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span> 
                        Upload & Crop
                    </h2>
                </div>
                <input type="file" id="imageInput" accept="image/*" class="w-full text-sm block text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                
                <div class="h-64 bg-gray-50 rounded-lg overflow-hidden border border-dashed border-gray-300 shadow-inner">
                    <img id="imageToCrop" class="max-w-full">
                </div>
                <button id="cropBtn" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-bold hover:bg-blue-700 transition shadow-md active:scale-[0.98]">Confirm Crop</button>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span> 
                        Adjustments
                    </h2>
                </div>
                <div class="bg-gray-50 border border-gray-200 p-4 rounded-xl flex flex-col gap-5 shadow-sm">
                    
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase tracking-wider">Paper Size</label>
                            <select id="paperSize" onchange="updateSettings()" class="w-full border-gray-300 rounded-md p-1.5 text-sm bg-white shadow-sm border focus:ring-blue-500 focus:border-blue-500 cursor-pointer">
                                <option value="A4">A4 Size</option>
                                <option value="Letter">Short (Letter)</option>
                            </select>
                        </div>
                        <div class="w-24">
                            <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase tracking-wider">Cut Border</label>
                            <input type="color" id="borderColor" value="#000000" oninput="updateSettings()" class="w-full h-8 border border-gray-300 rounded-md cursor-pointer shadow-sm p-0 bg-white">
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="pb-2 border-b border-gray-200">
                            <div class="flex justify-between">
                                <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase tracking-wider">Line Thickness</label>
                                <span class="text-xs font-mono text-gray-600" id="thickVal">1px</span>
                            </div>
                            <input type="range" id="thickness" min="0" max="5" step="1" value="1" oninput="updateSettings()" class="w-full cursor-pointer accent-gray-800">
                        </div>

                        <div>
                            <div class="flex justify-between">
                                <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase tracking-wider">Brightness</label>
                                <span class="text-xs font-mono text-gray-600" id="brightVal">100%</span>
                            </div>
                            <input type="range" id="brightness" min="50" max="150" value="100" oninput="updateSettings()" class="w-full cursor-pointer accent-blue-600">
                        </div>
                        <div>
                            <div class="flex justify-between">
                                <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase tracking-wider">Contrast</label>
                                <span class="text-xs font-mono text-gray-600" id="contrastVal">100%</span>
                            </div>
                            <input type="range" id="contrast" min="50" max="150" value="100" oninput="updateSettings()" class="w-full cursor-pointer accent-blue-600">
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2">
                        <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">3</span> 
                        Add to Canvas
                    </h2>
                    <button onclick="clearQueue()" class="text-xs text-red-500 font-semibold hover:underline">Clear Sheet</button>
                </div>
                
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="addToQueue('2x2')" class="bg-white border-2 border-gray-200 p-3 rounded-xl shadow-sm hover:border-blue-400 hover:bg-blue-50 transition active:scale-[0.97] group">
                        <div class="text-sm font-black text-gray-700 group-hover:text-blue-700">2x2</div>
                        <div class="text-xl text-gray-300 group-hover:text-blue-500 font-black mt-1">+</div>
                    </button>
                    <button onclick="addToQueue('passport')" class="bg-white border-2 border-gray-200 p-3 rounded-xl shadow-sm hover:border-blue-400 hover:bg-blue-50 transition active:scale-[0.97] group">
                        <div class="text-sm font-black text-gray-700 group-hover:text-blue-700 leading-tight">Pass<br>port</div>
                        <div class="text-xl text-gray-300 group-hover:text-blue-500 font-black mt-1">+</div>
                    </button>
                    <button onclick="addToQueue('1x1')" class="bg-white border-2 border-gray-200 p-3 rounded-xl shadow-sm hover:border-blue-400 hover:bg-blue-50 transition active:scale-[0.97] group">
                        <div class="text-sm font-black text-gray-700 group-hover:text-blue-700">1x1</div>
                        <div class="text-xl text-gray-300 group-hover:text-blue-500 font-black mt-1">+</div>
                    </button>
                </div>
            </div>
            
            <hr class="border-gray-200">

            <button onclick="window.print()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black text-lg hover:bg-green-700 transition shadow-lg active:scale-[0.98] flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                PRINT
            </button>
            
            <div class="h-4"></div>
        </div>
    </div>

    <div id="workspaceContainer" class="flex-1 h-full overflow-auto bg-gray-300 print-workspace relative z-0 cursor-grab shadow-inner">
        <div class="print-padding-wrapper min-w-max min-h-full p-10 md:p-16 flex justify-center items-start">
            <div id="printArea" class="print-area shadow-2xl relative transition-all duration-300">
                <div id="grid-2x2" class="id-grid" style="grid-template-columns: repeat(3, max-content);"></div>
                <div id="grid-passport" class="id-grid" style="grid-template-columns: repeat(3, max-content);"></div>
                <div id="grid-1x1" class="id-grid" style="grid-template-columns: repeat(6, max-content);"></div>
            </div>
        </div>
    </div>

    <script>
        let cropper;
        let croppedImageData = null;
        const pxPerInch = 96;

        const sizes = {
            '2x2': { w: 2 * pxPerInch, h: 2 * pxPerInch },
            'passport': { w: 1.77 * pxPerInch, h: 1.37 * pxPerInch }, 
            '1x1': { w: 1 * pxPerInch, h: 1 * pxPerInch }
        };

        function updateSettings() {
            const color = document.getElementById('borderColor').value;
            document.documentElement.style.setProperty('--border-color', color);

            const thickness = document.getElementById('thickness').value;
            document.getElementById('thickVal').innerText = `${thickness}px`;
            document.documentElement.style.setProperty('--border-thickness', `${thickness}px`);

            const bright = document.getElementById('brightness').value;
            const contrast = document.getElementById('contrast').value;
            document.getElementById('brightVal').innerText = `${bright}%`;
            document.getElementById('contrastVal').innerText = `${contrast}%`;
            document.documentElement.style.setProperty('--img-brightness', `${bright}%`);
            document.documentElement.style.setProperty('--img-contrast', `${contrast}%`);

            const paper = document.getElementById('paperSize').value;
            const printArea = document.getElementById('printArea');
            const printStyle = document.getElementById('printPageStyle');

            if (paper === 'A4') {
                printArea.style.width = '210mm';
                printArea.style.minHeight = '297mm';
                printStyle.innerHTML = '@page { size: A4; margin: 5mm; }';
            } else if (paper === 'Letter') {
                printArea.style.width = '8.5in';
                printArea.style.minHeight = '11in';
                printStyle.innerHTML = '@page { size: letter; margin: 5mm; }';
            }
        }

        document.getElementById('imageInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = document.getElementById('imageToCrop');
                img.src = event.target.result;
                if (cropper) cropper.destroy();
                cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
                
                document.getElementById('brightness').value = 100;
                document.getElementById('contrast').value = 100;
                updateSettings();
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('cropBtn').onclick = () => {
            if (!cropper) return;
            croppedImageData = cropper.getCroppedCanvas().toDataURL('image/jpeg', 1.0);
            
            const btn = document.getElementById('cropBtn');
            const originalText = btn.innerText;
            btn.innerText = "✓ Ready to Add!";
            btn.classList.replace('bg-blue-600', 'bg-green-500');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-green-500', 'bg-blue-600');
            }, 1500);
        };

        function addToQueue(type) {
            if (!croppedImageData) return alert("Please upload and confirm a crop first!");
            
            let targetGrid;
            if (type === '2x2') targetGrid = document.getElementById('grid-2x2');
            else if (type === 'passport') targetGrid = document.getElementById('grid-passport');
            else if (type === '1x1') targetGrid = document.getElementById('grid-1x1');

            const config = sizes[type];

            const img = document.createElement('img');
            img.className = 'border-overlap';
            
            img.style.width = `${config.w}px`;
            img.style.height = `${config.h}px`;
            img.style.minWidth = `${config.w}px`;
            img.style.maxWidth = `${config.w}px`;
            img.style.objectFit = 'cover';
            img.style.display = 'block';

            if (type === 'passport') {
                const tempImg = new Image();
                tempImg.src = croppedImageData;
                tempImg.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = tempImg.width;
                    canvas.height = tempImg.height;

                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate(-90 * Math.PI / 180);
                    ctx.drawImage(tempImg, -tempImg.width / 2, -tempImg.height / 2);

                    img.src = canvas.toDataURL('image/jpeg', 1.0);
                    targetGrid.appendChild(img);
                };
            } else {
                img.src = croppedImageData;
                targetGrid.appendChild(img);
            }
        }

        function clearQueue() {
            document.getElementById('grid-2x2').innerHTML = '';
            document.getElementById('grid-passport').innerHTML = '';
            document.getElementById('grid-1x1').innerHTML = '';
        }

        const workspace = document.getElementById('workspaceContainer');
        let isDown = false;
        let startX;
        let startY;
        let scrollLeft;
        let scrollTop;

        workspace.addEventListener('mousedown', (e) => {
            isDown = true;
            workspace.classList.add('cursor-grabbing');
            startX = e.pageX - workspace.offsetLeft;
            startY = e.pageY - workspace.offsetTop;
            scrollLeft = workspace.scrollLeft;
            scrollTop = workspace.scrollTop;
        });

        workspace.addEventListener('mouseleave', () => {
            isDown = false;
            workspace.classList.remove('cursor-grabbing');
        });

        workspace.addEventListener('mouseup', () => {
            isDown = false;
            workspace.classList.remove('cursor-grabbing');
        });

        workspace.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault(); 
            const x = e.pageX - workspace.offsetLeft;
            const y = e.pageY - workspace.offsetTop;
            const walkX = (x - startX) * 1.5; 
            const walkY = (y - startY) * 1.5;
            workspace.scrollLeft = scrollLeft - walkX;
            workspace.scrollTop = scrollTop - walkY;
        });
    </script>
</body>
</html>
